name: SimVersus

# The .xcodeproj is generated by XcodeGen from this spec, but is committed so
# the project opens directly in Xcode. Source folders use Xcode 16+ synchronized
# groups (type: syncedFolder): dropping a file into App/, Core/, Features/,
# DesignSystem/ or Resources/ adds it to the build automatically — later parts
# (1b–1f) do not need to re-run XcodeGen unless they change project settings.

options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  minimumXcodeGenVersion: "2.44.0"
  groupSortPosition: top
  generateEmptySchemes: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SimVersus:
    type: application
    platform: iOS
    sources:
      - path: App
        type: syncedFolder
      - path: Core
        type: syncedFolder
      - path: Features
        type: syncedFolder
      - path: DesignSystem
        type: syncedFolder
      - path: Resources
        type: syncedFolder
      # Referenced so it shows in the navigator; not copied into the bundle.
      - path: Info.plist
        buildPhase: none
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        product: GoogleUserMessagingPlatform
      # Weak-linked ONLY to silence the benign clean-build note
      # "No AppIntents.framework dependency found" that Xcode's metadata
      # processor emits for every app target without App Intents. First-party
      # Apple framework, no App Intents code; the NL processor sees no App
      # Shortcuts and skips, so it does not touch the bundle Info.plist.
      - sdk: AppIntents.framework
        weak: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simversus.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        # iPhone-only. Set at target level to override XcodeGen's "1,2" preset.
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - SimVersusTests

  SimVersusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SimVersusTests
        type: syncedFolder
    dependencies:
      - target: SimVersus
      # Same benign-warning silencer as the app target (see above).
      - sdk: AppIntents.framework
        weak: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simversus.app.tests
        GENERATE_INFOPLIST_FILE: YES

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.0.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: 3.1.0
